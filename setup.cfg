[tool:pytest]
testpaths = tests
markers =
    integration: 集成测试（需要模型和 GPU）
    slow: 慢速测试
    tts: TTS 相关测试
addopts = --strict-markers -v

[flake8]
max-line-length = 120
exclude = .git,__pycache__,build,dist

[mypy]
python_version = 3.10
warn_return_any = True
warn_unused_configs = True
ignore_missing_imports = True

[coverage:run]
source = mosaic
omit = tests/*